
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1f2937" media="(prefers-color-scheme: dark)" />
    <title>Controle de Estoque Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Aplica o tema escuro imediatamente se estiver salvo no localStorage
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }

      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'primary': '#1e40af',
              'secondary': '#1d4ed8',
              'accent': '#3b82f6',
              'neutral': '#1f2937',
              'base-100': '#f9fafb',
              'info': '#2563eb',
              'success': '#16a34a',
              'warning': '#f59e0b',
              'error': '#dc2626',
            },
          },
        },
      }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/heroicons/2.1.3/24/outline/heroicons.min.css" integrity="sha512-VbT2yO7xMUrwG64oNwdWcWb3SGNgrifXmFh57k9V2jQcK2o7iTj+4AjFccBvjOghbNIP4Y48vIu0hcvVvGq2GA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script type="importmap">

    "vite": "https://esm.sh/vite@^7.3.1",

    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.95.3"
  }
}
</script>
</head>
